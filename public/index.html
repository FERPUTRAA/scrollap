<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIKU — Neural Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --accent: #58a6ff;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --border: #30363d;
            --user-bg: #1f6feb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            background: rgba(13, 17, 23, 0.9);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .logo { font-weight: 700; color: var(--accent); letter-spacing: 1px; }
        .status { font-size: 0.75rem; color: #3fb950; display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; background: #3fb950; border-radius: 50%; box-shadow: 0 0 8px #3fb950; }

        /* Chat Window */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .msg { max-width: 85%; display: flex; flex-direction: column; }
        .msg.user { align-self: flex-end; }
        .msg.bot { align-self: flex-start; }

        .bubble {
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 2px; }
        .bot .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* Markdown Styling */
        pre { background: #000; padding: 1rem; border-radius: 8px; margin: 0.5rem 0; overflow-x: auto; border: 1px solid var(--border); }
        code { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
        p { margin-bottom: 0.5rem; }

        /* Input Area */
        .input-area {
            padding: 1.5rem;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }
        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
            background: var(--surface);
            padding: 0.4rem 0.8rem;
            border-radius: 0.8rem;
            border: 1px solid var(--border);
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.6rem;
            outline: none;
            font-size: 1rem;
        }
        button {
            background: var(--accent);
            color: #0d1117;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.96); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Welcome Message */
        #welcome-msg { text-align: center; margin-top: 4rem; color: var(--text-muted); }
    </style>
</head>
<body>

<header>
    <div class="logo">AIKU NEURAL</div>
    <div class="status"><div class="dot"></div> ONLINE</div>
</header>

<div id="chat-window">
    <div id="welcome-msg">
        <h2>Selamat Datang</h2>
        <p>Tanyakan apa saja pada sistem inteligensi AIKU.</p>
    </div>
</div>

<div class="input-area">
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Tulis pesan..." autofocus>
        <button id="sendBtn">KIRIM</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Setup Markdown
    marked.setOptions({ breaks: true, gfm: true });

    function addMessage(content, sender) {
        const welcome = document.getElementById('welcome-msg');
        if (welcome) welcome.remove();

        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${sender}`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        if (sender === 'bot') {
            bubble.innerHTML = marked.parse(content);
        } else {
            bubble.textContent = content;
        }

        msgDiv.appendChild(bubble);
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            addMessage(data.reply, 'bot');
        } catch (e) {
            addMessage("⚠️ Gagal terhubung ke server. Pastikan server AIKU sedang berjalan.", "bot");
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
